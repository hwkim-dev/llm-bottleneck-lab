name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Check Python Version
      run: python --version

    - name: Compile python files
      run: |
        python -m py_compile run.py benchmark.py scripts/generate_report.py
        python -m compileall engine scripts

    - name: Run Run.py Smoke Tests
      run: |
        python run.py --model examples/tiny_model_stub --backend cpu --precision fp16 --dry-run
        python run.py --model examples/tiny_model_stub --backend vulkan --precision int4 --dry-run

    - name: Run Benchmark Smoke Test
      run: |
        python benchmark.py --model examples/tiny_model_stub --backends cpu,vulkan --precisions fp16,int4 --dry-run

    - name: Generate Report
      run: python scripts/generate_report.py
